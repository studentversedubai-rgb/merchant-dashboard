# wrangler.toml — Cloudflare Workers Static Assets configuration
# Docs: https://developers.cloudflare.com/workers/static-assets/

name = "sv-merchant-validator"
compatibility_date = "2024-01-01"

# Serve the Vite-compiled output as static assets.
# All files get correct MIME types automatically (.js → application/javascript, etc.)
[assets]
directory = "./frontend/dist"

# Route any 404 back to index.html so React Router handles client-side routes.
not_found_handling = "single-page-application"
